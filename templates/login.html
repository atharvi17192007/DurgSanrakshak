<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>लॉगिन | DurgSanrakshak</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth-common.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="auth-page">

  <!-- ============ LEFT: FORT SCENE ============ -->
  <div class="fort-panel">
    <svg viewBox="0 0 800 1000" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
      <!-- distant hill layer -->
      <polygon points="0,620 90,560 180,610 260,540 350,600 430,550 520,615 610,560 700,605 800,545 800,1000 0,1000"
               fill="#3B2A44" opacity="0.55"/>
      <!-- mid hill layer -->
      <polygon points="0,700 100,650 210,690 300,630 400,685 500,635 600,695 700,645 800,690 800,1000 0,1000"
               fill="#5A3A3E" opacity="0.75"/>
      <!-- near hill / fort base -->
      <polygon points="0,800 120,740 230,790 340,720 420,780 520,730 640,785 800,735 800,1000 0,1000"
               fill="#241A18"/>

      <!-- fort rampart wall on near hill -->
      <g fill="#1B1310">
        <rect x="230" y="700" width="26" height="46"/>
        <rect x="256" y="686" width="26" height="60"/>
        <rect x="282" y="700" width="26" height="46"/>
        <rect x="308" y="686" width="26" height="60"/>
        <rect x="334" y="700" width="26" height="46"/>
        <rect x="360" y="686" width="26" height="60"/>
        <rect x="386" y="700" width="26" height="46"/>
        <!-- bastion tower -->
        <rect x="330" y="600" width="60" height="100" rx="2"/>
        <polygon points="322,600 398,600 360,560"/>
      </g>

      <!-- flag pole + flag -->
      <g>
        <rect x="358" y="520" width="3" height="45" fill="#1B1310"/>
        <path class="flag" d="M361 522 L400 530 L361 542 Z" fill="#F4842D"/>
      </g>

      <!-- birds -->
      <g stroke="#F3E6C9" stroke-width="2" fill="none" opacity="0.6">
        <path d="M120 260 q8 -10 16 0 q8 -10 16 0"/>
        <path d="M170 300 q6 -8 12 0 q6 -8 12 0"/>
        <path d="M600 230 q8 -10 16 0 q8 -10 16 0"/>
      </g>
    </svg>

    <div class="fort-scene-content">
      <div class="brand-mark">
        <svg class="emblem" viewBox="0 0 44 44" fill="none">
          <circle cx="22" cy="22" r="21" stroke="#F4842D" stroke-width="2"/>
          <path d="M14 28 L14 18 L22 12 L30 18 L30 28 Z" fill="#F4842D"/>
        </svg>
        <span>दुर्गसंरक्षक</span>
      </div>

      <p class="fort-quote">"प्रत्येक दगड बोलतो<br>एक इतिहास."</p>

      <div class="fort-stats">
        <div><strong>५००+</strong><small>स्वयंसेवक</small></div>
        <div><strong>१२०+</strong><small>किल्ले</small></div>
        <div><strong>५०+</strong><small>मोहिमा</small></div>
      </div>
    </div>
  </div>

  <!-- ============ RIGHT: LOGIN CARD ============ -->
  <div class="auth-card-wrap">
    <div class="auth-card">

      <div class="seal-badge">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M6 20 L6 11 L12 6 L18 11 L18 20 Z" fill="#FBF3E3"/>
        </svg>
      </div>

      <h1>पुन्हा स्वागत आहे</h1>
      <p class="subtitle">गड संवर्धन मोहिमेत सहभागी होण्यासाठी लॉगिन करा</p>

      <form id="loginForm" novalidate>

        <div class="field">
          <label for="loginId">ईमेल किंवा मोबाईल क्रमांक</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 6h16v12H4z"/><path d="M4 7l8 6 8-6"/>
            </svg>
            <input type="text" id="loginId" name="loginId" placeholder="tumche@email.com" autocomplete="username">
          </div>
          <span class="field-error" id="loginIdError"></span>
        </div>

        <div class="field">
          <label for="loginPass">पासवर्ड</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 018 0v3"/>
            </svg>
            <input type="password" id="loginPass" name="loginPass" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="toggle-eye" data-target="loginPass" aria-label="पासवर्ड दाखवा">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="loginPassError"></span>
        </div>

        <div class="row-between">
          <label class="checkbox-line remember-check">
            <input type="checkbox" id="remember">
            मला लक्षात ठेवा
          </label>
          <a href="#" class="link-muted">पासवर्ड विसरलात?</a>
        </div>

        <button type="submit" class="btn-primary">लॉगिन करा</button>
      </form>

      <div class="divider">किंवा</div>

      <p class="switch-line">खाते नाही? <a href="{{ url_for('signup_page') }}" class="link-muted">नोंदणी करा</a></p>

    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
